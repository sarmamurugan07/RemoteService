  // Utility: secure random integer
  function randInt(max){
    // returns integer in [0, max)
    const array = new Uint32Array(1);

      if (opts.avoidSimilar && used.size >= alphabet.length){

      }

      // ensure avoidSimilar constraint without infinite loop

    else if (bits < 36) { label = 'Weak'; score = Math.max(19, Math.min(score,35)); }

    else if (bits < 128) { label = 'Strong'; score = Math.max(61, Math.min(score,92));}

<script>
    const el = id => document.getElementById(id);

    const lower = el("lower");
    const upper = el("upper");
    const numbers = el("numbers");
    const symbols = el("symbols");
    const excludeAmbiguous = el("excludeAmbiguous");
    const avoidSimilar = el("avoidSimilar");
    const lengthInput = el("lengthInput");
    const passwordOutput = el("passwordOutput");
    const copyBtn = el("copyBtn");
    const generateBtn = el("generateBtn");

    const userNameInput = el("userName");
    const useUsername = el("useUsername");

    /* ===========================
       CHARACTER SET BUILDER
       =========================== */
    function buildAlphabet(opts) {
        let chars = "";

        if (opts.lower) chars += "abcdefghijklmnopqrstuvwxyz";
        if (opts.upper) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (opts.numbers) chars += "0123456789";
        if (opts.symbols) chars += "!@#$%^&*()-_=+[]{}<>?/|";

        if (opts.excludeAmbiguous) {
            chars = chars.replace(/[O0Il1S5B8]/g, "");
        }

        return chars;
    }

    /* Random integer */
    function randInt(limit) {
        const arr = new Uint32Array(1);
        crypto.getRandomValues(arr);
        return arr[0] % limit;
    }

    /* ===========================
       USERNAME-BASED GENERATOR
       =========================== */
    function generate(opts) {
        const alphabet = buildAlphabet(opts);
        if (!alphabet.length) return { password: "", alphabetSize: 0 };

        let baseSeed = "";

        if (opts.useUsername && opts.username) {
            baseSeed = Array.from(opts.username)
                .map(c => c.charCodeAt(0) + randInt(99))
                .join("");
        }

        let pw = "";
        const used = new Set();

        for (let i = 0; i < opts.length; i++) {
            let mixIndex = 0;

            if (baseSeed)
                mixIndex = parseInt(baseSeed[i % baseSeed.length], 10) || 0;

            let ch;
            let attempts = 0;

            do {
                const rnd = (randInt(alphabet.length) + mixIndex) % alphabet.length;
                ch = alphabet[rnd];
                attempts++;
                if (attempts > 50) break;
            } while (opts.avoidSimilar && used.has(ch));

            pw += ch;
            used.add(ch);
        }

        return { password: pw, alphabetSize: alphabet.length };
    }

    function getOptionsFromUI() {
        return {
            length: parseInt(lengthInput.value, 10),
            lower: lower.checked,
            upper: upper.checked,
            numbers: numbers.checked,
            symbols: symbols.checked,
            excludeAmbiguous: excludeAmbiguous.checked,
            avoidSimilar: avoidSimilar.checked,

           CHARACTER SET BUILDER
           =========================== */
        function buildAlphabet(opts) {
            let chars = "";

            if (opts.lower) chars += "abcdefghijklmnopqrstuvwxyz";
            if (opts.upper) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if (opts.numbers) chars += "0123456789";
            if (opts.symbols) chars += "!@#$%^&*()-_=+[]{}<>?/|";

            if (opts.excludeAmbiguous) {
                chars = chars.replace(/[O0Il1S5B8]/g, "");
            }

            return chars;
        }

        /* Random integer */
        function randInt(limit) {
            const arr = new Uint32Array(1);
            crypto.getRandomValues(arr);
            return arr[0] % limit;
        }

        /* ===========================
           USERNAME-BASED GENERATOR
           =========================== */
        function generate(opts) {
            const alphabet = buildAlphabet(opts);
            if (!alphabet.length) return { password: "", alphabetSize: 0 };

            let baseSeed = "";

            if (opts.useUsername && opts.username) {
                baseSeed = Array.from(opts.username)
                    .map(c => c.charCodeAt(0) + randInt(99))
                    .join("");

            let pw = "";

            for (let i = 0; i < opts.length; i++) {

                if (baseSeed)
                    mixIndex = parseInt(baseSeed[i % baseSeed.length], 10) || 0;

                let ch;
                let attempts = 0;

                do {
                    const rnd = (randInt(alphabet.length) + mixIndex) % alphabet.length;
                    ch = alphabet[rnd];
                    attempts++;
                    if (attempts > 50) break;
                } while (opts.avoidSimilar && used.has(ch));

                pw += ch;
                used.add(ch);
            }

<!DOCTYPE html>
<html>
<head>
    <title>Voice Call App</title>

    <!-- SignalR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>

</head>
<body style="font-family:sans-serif; background:#111; color:white; padding:20px;">

    <h2>Voice Calling (WebRTC + SignalR)</h2>

    <label>Your Username: </label>
    <input id="usernameInput" type="text">
    <button onclick="register()">Register</button>

    <br><br>

    <label>Call Username: </label>
    <input id="callUserInput" type="text">
    <button onclick="startCall()">Call</button>

    <br><br>

    <audio id="remoteAudio" autoplay playsinline></audio>

    <script>
        let connection;
        let peer;
        let localStream;
        let otherConnId;

        // -----------------------------
        // REGISTER USER
        // -----------------------------
        async function register() {

            connection = new signalR.HubConnectionBuilder()
                .withUrl("https://localhost:7173/voiceHub")  // FIXED URL
                .withAutomaticReconnect()
                .build();

            // Connect to SignalR
            await connection.start();

            const username = document.getElementById("usernameInput").value;
            await connection.invoke("RegisterUser", username);
            alert("Registered as " + username);

            setupSignalRHandlers();
        }

        // -----------------------------
        // CREATE PEER
        // -----------------------------
        function createPeer() {

            peer = new RTCPeerConnection({
                iceServers: [
                    { urls: "stun:stun.l.google.com:19302" }
                ]
            });

            peer.onicecandidate = (event) => {
                if (event.candidate && otherConnId) {
                    connection.invoke("SendIceCandidate", otherConnId, JSON.stringify(event.candidate));
                }
            };

            peer.ontrack = (event) => {
                document.getElementById("remoteAudio").srcObject = event.streams[0];
            };

            return peer;
        }

        // -----------------------------
        // START CALL
        // -----------------------------
        async function startCall() {

            const targetUser = document.getElementById("callUserInput").value;

            peer = createPeer();

            // Microphone permission
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getTracks().forEach(t => peer.addTrack(t, localStream));

            const offer = await peer.createOffer();
            await peer.setLocalDescription(offer);

            // Send offer to target username
            await connection.invoke("CallUser", targetUser, JSON.stringify(offer));
        }

        // -----------------------------
        // SIGNALR HANDLERS
        // -----------------------------
        function setupSignalRHandlers() {

            // Incoming offer
            connection.on("ReceiveOffer", async (callerConnId, offerJson) => {

                otherConnId = callerConnId;

                peer = createPeer();

                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getTracks().forEach(t => peer.addTrack(t, localStream));

                await peer.setRemoteDescription(JSON.parse(offerJson));

                const answer = await peer.createAnswer();
                await peer.setLocalDescription(answer);

                await connection.invoke("SendAnswer", callerConnId, JSON.stringify(answer));
            });

            // Incoming answer
            connection.on("ReceiveAnswer", async (answerJson) => {
                await peer.setRemoteDescription(JSON.parse(answerJson));
            });

            // Incoming ICE candidate
            connection.on("ReceiveIceCandidate", async (candidateJson) => {
                const cand = new RTCIceCandidate(JSON.parse(candidateJson));
                await peer.addIceCandidate(cand);
            });
        }
    </script>

</body>
</html>

</html>
